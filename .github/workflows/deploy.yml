name: Deploy to Shared Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # Cache frontend dependencies
      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-client-

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: ./client
        run: npm install

      # Build frontend
      - name: Build frontend
        working-directory: ./client
        run: npm run build

      # Cache backend dependencies
      - name: Cache backend dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-server-

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./server
        run: npm install

      - name: Check if files exist
        run: |
          if [ ! -d "./client/dist" ] || [ ! -d "./server" ]; then
            echo "No files found in ./client/dist or ./server"
            exit 1
          fi

      # Deploy to shared hosting using FTP (scp)
      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: "client/dist/* server/*"
          target: "/tmp/deploy"

      # Move files to correct locations and restart backend
      - name: Move files and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          script: |
            # Move frontend build to public folder
            rm -rf $${{ secrets.FRONTEND_PATH }}/*
            mv /tmp/deploy/client/dist/* $${{ secrets.FRONTEND_PATH }}/

            # Move backend files
            rm -rf $${{ secrets.BACKEND_PATH }}/*
            mv /tmp/deploy/server/* $${{ secrets.BACKEND_PATH }}/


            # Clean up temporary files
            rm -rf /tmp/deploy
